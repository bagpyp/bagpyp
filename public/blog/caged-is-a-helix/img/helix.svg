<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 540" font-family="ui-sans-serif, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0f172a"/><stop offset="0.55" stop-color="#172554"/><stop offset="1" stop-color="#3b0764"/></linearGradient>
    <linearGradient id="rise" x1="0" y1="1" x2="1" y2="0"><stop offset="0" stop-color="#38bdf8"/><stop offset="0.6" stop-color="#c084fc"/><stop offset="1" stop-color="#fb7185"/></linearGradient>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 Z" fill="#fb7185"/></marker>
  </defs>
  <rect width="1000" height="540" rx="22" fill="url(#bg)"/>
  <text x="500" y="43" text-anchor="middle" fill="#f8fafc" font-size="22" font-weight="850" letter-spacing="1.3">THE LOOP CLOSES ONLY AFTER REGISTER IS FORGOTTEN</text>

  <!-- Quotient circle -->
  <text x="245" y="88" text-anchor="middle" fill="#7dd3fc" font-size="18" font-weight="850">PITCH-CLASS QUOTIENT</text>
  <circle cx="245" cy="290" r="150" fill="#0f172a" opacity="0.6" stroke="#475569" stroke-width="2"/>
  <path d="M245 140 C345 140 395 220 395 290 C395 385 320 440 245 440 C145 440 95 365 95 290 C95 205 160 140 245 140" fill="none" stroke="#38bdf8" stroke-width="5" marker-end="url(#arrow)"/>
  <g fill="#1e293b" stroke="#e2e8f0" stroke-width="2.5">
    <circle cx="245" cy="140" r="28"/><circle cx="388" cy="246" r="28"/><circle cx="333" cy="410" r="28"/><circle cx="157" cy="410" r="28"/><circle cx="102" cy="246" r="28"/>
  </g>
  <g fill="#f8fafc" font-size="20" font-weight="950" text-anchor="middle">
    <text x="245" y="147">C</text><text x="388" y="253">A</text><text x="333" y="417">G</text><text x="157" y="417">E</text><text x="102" y="253">D</text>
  </g>
  <text x="245" y="292" text-anchor="middle" fill="#cbd5e1" font-size="17" font-weight="750">all roots labeled R</text>
  <text x="245" y="318" text-anchor="middle" fill="#94a3b8" font-size="14">register projected away</text>

  <!-- Lifted chain -->
  <text x="715" y="88" text-anchor="middle" fill="#e9d5ff" font-size="18" font-weight="850">ABSOLUTE-PITCH COVER</text>
  <g stroke="#475569" stroke-width="1.5" stroke-dasharray="6 7">
    <line x1="505" y1="395" x2="950" y2="395"/><line x1="505" y1="190" x2="950" y2="190"/>
  </g>
  <g fill="#cbd5e1" font-size="15" font-weight="800">
    <text x="510" y="385">root register n</text><text x="510" y="180">root register n+1</text>
  </g>
  <path d="M550 395 C600 430 645 430 685 395 S755 360 795 395 C835 430 870 370 885 300 C897 245 910 205 940 190" fill="none" stroke="url(#rise)" stroke-width="7" stroke-linecap="round" marker-end="url(#arrow)"/>
  <g fill="#1e293b" stroke="#f8fafc" stroke-width="2.5">
    <circle cx="550" cy="395" r="25"/><circle cx="630" cy="414" r="25"/><circle cx="710" cy="384" r="25"/><circle cx="790" cy="395" r="25"/>
    <circle cx="885" cy="300" r="27" stroke="#fb7185" stroke-width="4"/><circle cx="940" cy="190" r="27"/>
  </g>
  <g fill="#f8fafc" font-size="18" font-weight="950" text-anchor="middle">
    <text x="550" y="401">Cₙ</text><text x="630" y="420">Aₙ</text><text x="710" y="390">Gₙ</text><text x="790" y="401">Eₙ</text>
    <text x="885" y="306">Dₙ₊₁</text><text x="940" y="196">Cₙ₊₁</text>
  </g>
  <text x="848" y="245" text-anchor="end" fill="#fda4af" font-size="14" font-weight="900" letter-spacing="0.5">REGISTER SEAM</text>
  <path d="M856 249 L873 273" fill="none" stroke="#fda4af" stroke-width="2" stroke-linecap="round"/>
  <text x="715" y="482" text-anchor="middle" fill="#e2e8f0" font-size="15" font-weight="750">The final C has the same pitch class and a higher register.</text>
  <text x="715" y="508" text-anchor="middle" fill="#94a3b8" font-size="14">one traversal applies the deck transformation p ↦ p + 12</text>
</svg>
