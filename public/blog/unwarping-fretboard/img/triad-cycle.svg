<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 360" font-family="ui-sans-serif, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#172554"/>
    </linearGradient>
    <marker id="arrowPink" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#fb7185"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#38bdf8"/>
    </marker>
    <marker id="arrowGold" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#fbbf24"/>
    </marker>
  </defs>
  <rect width="820" height="360" rx="18" fill="url(#bg)"/>
  <text x="410" y="44" text-anchor="middle" fill="#e2e8f0" font-size="18" font-weight="700">THE MAJOR TRIAD AS A CYCLIC INTERVAL WORD</text>
  <line x1="130" y1="180" x2="295" y2="180" stroke="#fb7185" stroke-width="5" marker-end="url(#arrowPink)"/>
  <line x1="350" y1="180" x2="515" y2="180" stroke="#38bdf8" stroke-width="5" marker-end="url(#arrowBlue)"/>
  <line x1="570" y1="180" x2="735" y2="180" stroke="#fbbf24" stroke-width="5" marker-end="url(#arrowGold)"/>
  <circle cx="95" cy="180" r="36" fill="#1e293b" stroke="#fb7185" stroke-width="4"/>
  <circle cx="315" cy="180" r="36" fill="#1e293b" stroke="#38bdf8" stroke-width="4"/>
  <circle cx="535" cy="180" r="36" fill="#1e293b" stroke="#fbbf24" stroke-width="4"/>
  <circle cx="755" cy="180" r="36" fill="#1e293b" stroke="#fb7185" stroke-width="4"/>
  <text x="95" y="189" text-anchor="middle" fill="#f8fafc" font-size="25" font-weight="800">R</text>
  <text x="315" y="189" text-anchor="middle" fill="#f8fafc" font-size="25" font-weight="800">3</text>
  <text x="535" y="189" text-anchor="middle" fill="#f8fafc" font-size="25" font-weight="800">5</text>
  <text x="755" y="189" text-anchor="middle" fill="#f8fafc" font-size="25" font-weight="800">R′</text>
  <text x="205" y="135" text-anchor="middle" fill="#fb7185" font-size="20" font-weight="800">M3</text>
  <text x="205" y="220" text-anchor="middle" fill="#cbd5e1" font-size="16">4 semitones</text>
  <text x="425" y="135" text-anchor="middle" fill="#38bdf8" font-size="20" font-weight="800">m3</text>
  <text x="425" y="220" text-anchor="middle" fill="#cbd5e1" font-size="16">3 semitones</text>
  <text x="645" y="135" text-anchor="middle" fill="#fbbf24" font-size="20" font-weight="800">P4</text>
  <text x="645" y="220" text-anchor="middle" fill="#cbd5e1" font-size="16">5 semitones</text>
  <path d="M95 275 C250 335, 600 335, 755 275" fill="none" stroke="#94a3b8" stroke-width="2" stroke-dasharray="7 7"/>
  <text x="410" y="322" text-anchor="middle" fill="#e2e8f0" font-size="18" font-weight="700">4 + 3 + 5 = 12 = one octave</text>
</svg>
