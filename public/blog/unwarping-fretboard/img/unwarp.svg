<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 460" font-family="ui-sans-serif, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e1b4b"/>
    </linearGradient>
    <marker id="shiftArrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#fbbf24"/>
    </marker>
  </defs>
  <rect width="840" height="460" rx="18" fill="url(#bg)"/>
  <text x="420" y="42" text-anchor="middle" fill="#e2e8f0" font-size="18" font-weight="800">UNWARPING THE G–B SEAM</text>
  <text x="40" y="87" fill="#94a3b8" font-size="14">nutward</text>
  <text x="800" y="87" text-anchor="end" fill="#94a3b8" font-size="14">bridgeward</text>

  <g stroke="#475569" stroke-width="2">
    <line x1="145" y1="100" x2="145" y2="400"/>
    <line x1="255" y1="100" x2="255" y2="400"/>
    <line x1="365" y1="100" x2="365" y2="400"/>
    <line x1="475" y1="100" x2="475" y2="400"/>
    <line x1="585" y1="100" x2="585" y2="400"/>
    <line x1="695" y1="100" x2="695" y2="400"/>
  </g>

  <g stroke="#cbd5e1" stroke-width="2">
    <line x1="95" y1="130" x2="745" y2="130"/>
    <line x1="95" y1="180" x2="745" y2="180"/>
    <line x1="95" y1="230" x2="745" y2="230"/>
    <line x1="95" y1="280" x2="745" y2="280"/>
    <line x1="95" y1="330" x2="745" y2="330"/>
    <line x1="95" y1="380" x2="745" y2="380"/>
  </g>

  <g fill="#e2e8f0" font-size="17" font-weight="700" text-anchor="end">
    <text x="78" y="136">E</text>
    <text x="78" y="186">A</text>
    <text x="78" y="236">D</text>
    <text x="78" y="286">G</text>
    <text x="78" y="336" fill="#fbbf24">B</text>
    <text x="78" y="386" fill="#fbbf24">e</text>
  </g>

  <line x1="85" y1="305" x2="755" y2="305" stroke="#fb7185" stroke-width="4" stroke-dasharray="10 8"/>
  <rect x="614" y="290" width="124" height="30" rx="15" fill="#be123c"/>
  <text x="676" y="311" text-anchor="middle" fill="#fff" font-size="14" font-weight="800">G–B SEAM</text>

  <circle cx="365" cy="280" r="16" fill="#38bdf8"/>
  <text x="365" y="286" text-anchor="middle" fill="#0f172a" font-size="14" font-weight="900">G</text>
  <circle cx="365" cy="330" r="16" fill="none" stroke="#64748b" stroke-width="3" stroke-dasharray="5 4"/>
  <circle cx="475" cy="330" r="16" fill="#fbbf24"/>
  <text x="475" y="336" text-anchor="middle" fill="#0f172a" font-size="14" font-weight="900">B</text>
  <circle cx="365" cy="380" r="16" fill="none" stroke="#64748b" stroke-width="3" stroke-dasharray="5 4"/>
  <circle cx="475" cy="380" r="16" fill="#fbbf24"/>
  <text x="475" y="386" text-anchor="middle" fill="#0f172a" font-size="14" font-weight="900">e</text>

  <line x1="385" y1="330" x2="450" y2="330" stroke="#fbbf24" stroke-width="4" marker-end="url(#shiftArrow)"/>
  <line x1="385" y1="380" x2="450" y2="380" stroke="#fbbf24" stroke-width="4" marker-end="url(#shiftArrow)"/>
  <text x="525" y="350" fill="#fbbf24" font-size="16" font-weight="800">+1 fret</text>
  <text x="525" y="373" fill="#cbd5e1" font-size="14">move B and e together</text>

  <text x="420" y="434" text-anchor="middle" fill="#e2e8f0" font-size="17" font-weight="700">One cut. One translation. Every interval shape survives.</text>
</svg>
