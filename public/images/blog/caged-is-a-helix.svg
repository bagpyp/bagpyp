<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="ui-sans-serif, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0f172a"/><stop offset="0.55" stop-color="#172554"/><stop offset="1" stop-color="#3b0764"/></linearGradient>
    <linearGradient id="helix" x1="0" y1="1" x2="1" y2="0"><stop offset="0" stop-color="#38bdf8"/><stop offset="0.58" stop-color="#c084fc"/><stop offset="1" stop-color="#fb7185"/></linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="7" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <pattern id="gap" width="14" height="14" patternUnits="userSpaceOnUse" patternTransform="rotate(45)"><rect width="14" height="14" fill="#450a0a"/><rect width="5" height="14" fill="#7f1d1d" opacity="0.58"/></pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- abstract fretboard -->
  <g opacity="0.2" stroke="#94a3b8" stroke-width="2">
    <line x1="50" y1="150" x2="710" y2="150"/><line x1="50" y1="225" x2="710" y2="225"/><line x1="50" y1="300" x2="710" y2="300"/>
    <line x1="50" y1="375" x2="710" y2="375"/><line x1="50" y1="450" x2="710" y2="450"/><line x1="50" y1="525" x2="710" y2="525"/>
    <line x1="90" y1="110" x2="90" y2="565"/><line x1="190" y1="110" x2="190" y2="565"/><line x1="290" y1="110" x2="290" y2="565"/>
    <line x1="390" y1="110" x2="390" y2="565"/><line x1="490" y1="110" x2="490" y2="565"/><line x1="590" y1="110" x2="590" y2="565"/><line x1="690" y1="110" x2="690" y2="565"/>
  </g>
  <rect x="390" y="110" width="100" height="455" fill="url(#gap)" opacity="0.72"/>
  <text x="440" y="592" text-anchor="middle" fill="#fb7185" font-size="16" font-weight="900">0 / 6</text>

  <!-- rising CAGED path -->
  <path d="M105 450 C165 520 230 520 285 450 S375 380 430 450 C480 505 520 410 545 315 C570 225 610 170 675 150" fill="none" stroke="url(#helix)" stroke-width="12" stroke-linecap="round" filter="url(#glow)"/>
  <g fill="#1e293b" stroke="#f8fafc" stroke-width="3">
    <circle cx="105" cy="450" r="30"/><circle cx="215" cy="485" r="30"/><circle cx="325" cy="425" r="30"/><circle cx="425" cy="450" r="30"/>
    <circle cx="545" cy="315" r="33" stroke="#fb7185" stroke-width="5"/><circle cx="675" cy="150" r="32"/>
  </g>
  <g fill="#f8fafc" font-size="22" font-weight="950" text-anchor="middle">
    <text x="105" y="458">C</text><text x="215" y="493">A</text><text x="325" y="433">G</text><text x="425" y="458">E</text><text x="545" y="323">D</text><text x="675" y="158">C′</text>
  </g>
  <text x="546" y="370" text-anchor="middle" fill="#fda4af" font-size="17" font-weight="900">+12</text>

  <!-- title card -->
  <rect x="735" y="118" width="405" height="330" rx="28" fill="#0f172a" opacity="0.9" stroke="#475569" stroke-width="2"/>
  <text x="780" y="184" fill="#f8fafc" font-size="43" font-weight="950">CAGED IS</text>
  <text x="780" y="236" fill="#f8fafc" font-size="43" font-weight="950">A HELIX</text>
  <text x="780" y="292" fill="#cbd5e1" font-size="21">bass roots · the missing fret</text>
  <text x="780" y="327" fill="#cbd5e1" font-size="21">the hidden register seam</text>
  <rect x="780" y="366" width="145" height="6" rx="3" fill="#38bdf8"/><rect x="925" y="366" width="95" height="6" rx="3" fill="#c084fc"/><rect x="1020" y="366" width="73" height="6" rx="3" fill="#fb7185"/>
  <text x="70" y="70" fill="#e2e8f0" font-size="18" font-weight="750" letter-spacing="3">MUSIC × MATHEMATICS</text>
</svg>
